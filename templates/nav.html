<nav>
  <div class="logo">
    <h1>ToDo</h1>
  </div>

  <div class="links">
    {% if user.is_authenticated %}

    <a
      href="{% url 'home' %}"
      class="{% if request.path == '/' %}active{% endif %}"
      >HOME</a
    >
    <a href="">ADD</a>
    <a href="">COMPLETED</a>
    <a href="">TRASH</a>
    <a href="{% url 'logout_' %}"> LOGOUT </a>
    <a
      href="{% url 'profile' %}"
      class="{% if request.path == '/auth/profile/' %}active{% endif %}"
      >PROFILE</a
    >
    {% else %}
    <a
      href="{% url 'login_' %}"
      class="{% if request.path == '/auth/login/' %}active{% endif %}"
      >LOGIN</a
    >
    <a
      href="{% url 'register' %}"
      class="{% if request.path == '/auth/register/' %}active{% endif %}"
      >REGISTER</a
    >
    <a
      href="{% url 'about' %}"
      class="{% if request.path == '/auth/about/' %}active{% endif %}"
    >
      ABOUT
    </a>
    {% endif %}
  </div>
