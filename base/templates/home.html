{% extends "main.html" %} {% block content %}

<div class="taskcontainer">
  <div class="taskformcard">
    <h1>My Tasks</h1>

    <form method="POST">
      {% csrf_token %}

      <label>Task Title</label>
      <input type="text" name="title" maxlength="100" required />

      <label>Description</label>
      <input type="text" name="desc" maxlength="300" required />

      <button type="submit">Add Task</button>
    </form>

    <div class="deleteallbox">
      <a href="{% url 'deleteall' %}" class="deleteallbtn">
        Delete All Tasks
      </a>
    </div>
  </div>

  <div class="tasklist">
    <form method="GET" class="searchform">
      <input
        type="text"
        name="q"
        placeholder="Search tasks..."
        value="{{ request.GET.q }}"
      />
      <button type="submit">Search</button>
    </form>

    {% for i in data %}
    <div class="taskcard">
      <div class="taskleft">
        <h3>{{ i.title }}</h3>
        <p>{{ i.desc }}</p>
      </div>

      <div class="taskright">
        <a href="{% url 'delete' i.id %}" class="deletetaskbtn">Delete</a>
      </div>
    </div>
    {% empty %}
    <div class="emptytask">
      {% if request.GET.q %}
      <h2>No Data Found</h2>
      {% else %}
      <h2>No Tasks Available</h2>
      <p>Add your first task above.</p>
      {% endif %}
    </div>
    {% endfor %}
  </div>
</div>

{% endblock %}
